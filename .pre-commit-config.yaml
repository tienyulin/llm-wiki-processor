repos:
  - repo: local
    hooks:
      # Linters run from the locally-installed toolchain (requirements.txt) — no
      # network fetch, so this works on an air-gapped intranet.
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]

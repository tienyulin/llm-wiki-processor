# wiki-processor — attaches to the SHARED infra (llm-wiki-infra: minio + pg on
# the external docker network `llm-wiki-net`). This lets every service run at
# once, sharing one MinIO + Postgres, with no infra port clash.
#
# Start the shared infra FIRST (once):
#   git clone https://github.com/tienyulin/llm-wiki-infra   # if you don't have it
#   (cd ../llm-wiki-infra && docker compose up -d)
# Then:
#   cp .env.example .env        # keep MOCK_LLM=true for a no-key run
#   docker compose up -d --build
#   curl localhost:8001/health
services:
  wiki-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wiki-processor
    ports:
      - "8001:8001"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      LLM_API_KEY: ${LLM_API_KEY:-${MINIMAX_API_KEY:-}}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4000}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      MOCK_LLM: ${MOCK_LLM:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wiki-data}
      PROCESSOR_API_KEY: ${PROCESSOR_API_KEY:-}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp-server:8002}
      PG_DSN: ${PG_DSN:-postgresql://wiki:wikipass@pg:5432/wiki}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-false}
      MOCK_EMBEDDINGS: ${MOCK_EMBEDDINGS:-true}
    networks: [llm-wiki-net]
    command: python main.py

# Shared network owned by llm-wiki-infra. Start that stack first, or this fails
# with "network llm-wiki-net not found".
networks:
  llm-wiki-net:
    external: true

[tool.black]
line-length = 100
target-version = ["py314"]

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true   # third-party libs ship no stubs (minio, psycopg...)
warn_unused_ignores = true
check_untyped_defs = true

[tool.pylint.main]
py-version = "3.14"

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
# duplicate-code (R0801): the 6 LLM provider adapters are intentionally
# parallel — each binds a different vendor API behind the same interface.
# Collapsing the shared HTTP skeleton into the base would couple unrelated
# vendor contracts; the duplication is the adapter pattern, not a defect.
disable = ["duplicate-code"]
